[pytest]
testpaths = tests
python_files = test_*.py
addopts =
    -q
    --strict-markers

[coverage:run]
source = core, workspace
omit =
    */tests/*
    PM Evidence AI Portal/*
    core/intent_sample.py
    core/bq_load.py
    core/chunking.py
    core/data_cleanup.py
    core/ollama_runtime.py
    workspace/ingest.py
    workspace/product_signals_dashboard.py
    workspace/tera_dashboard.py
    workspace/trust_strip.py
    workspace/strategy.py

[coverage:report]
show_missing = true
skip_covered = false
fail_under = 70
