version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: riwa_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama
    restart: unless-stopped

  pm_copilot:
    build: .
    container_name: riwa_pm_copilot
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_storage: